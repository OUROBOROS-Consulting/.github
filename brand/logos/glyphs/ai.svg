<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- AI: abstracted asterisk / starburst (6 rounded petals radiating from center) -->
  <!-- Evokes the Claude asterisk mark without copying it -->

  <!-- Hexagonal base -->
  <polygon points="100,188 152,158 152,98 100,68 48,98 48,158" fill="#C4A96B" stroke="#C4A96B" stroke-width="2"/>
  <polygon points="100,183 147,155 147,101 100,73 53,101 53,155" fill="#1A3D2B"/>

  <!-- 6-petal starburst, each petal is a rounded lozenge rotated around center -->
  <!-- Petals rendered as thick rounded strokes from center outward -->
  <g transform="translate(100,128)">
    <!-- Petal 0° (12 o'clock) -->
    <line x1="0" y1="0" x2="0" y2="-36" stroke="#F5EDD6" stroke-width="14" stroke-linecap="round" opacity="0.95"/>
    <!-- Petal 60° -->
    <line x1="0" y1="0" x2="31.2" y2="-18" stroke="#F5EDD6" stroke-width="14" stroke-linecap="round" opacity="0.95"/>
    <!-- Petal 120° -->
    <line x1="0" y1="0" x2="31.2" y2="18" stroke="#F5EDD6" stroke-width="14" stroke-linecap="round" opacity="0.95"/>
    <!-- Petal 180° (6 o'clock) -->
    <line x1="0" y1="0" x2="0" y2="36" stroke="#F5EDD6" stroke-width="14" stroke-linecap="round" opacity="0.95"/>
    <!-- Petal 240° -->
    <line x1="0" y1="0" x2="-31.2" y2="18" stroke="#F5EDD6" stroke-width="14" stroke-linecap="round" opacity="0.95"/>
    <!-- Petal 300° -->
    <line x1="0" y1="0" x2="-31.2" y2="-18" stroke="#F5EDD6" stroke-width="14" stroke-linecap="round" opacity="0.95"/>

    <!-- Inner overlap ring to visually unify petals -->
    <circle cx="0" cy="0" r="10" fill="#1A3D2B"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="#C4A96B"/>
  </g>

  <!-- Small hex cap -->
  <polygon points="100,20 112,27 112,41 100,48 88,41 88,27" fill="none" stroke="#C4A96B" stroke-width="2"/>
  <polygon points="100,28 107,32 107,40 100,44 93,40 93,32" fill="#1A3D2B"/>
</svg>
