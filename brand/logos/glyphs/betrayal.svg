<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Betrayal / Institutional Harm: fractured shield with broken seal -->
  <!-- Hex base -->
  <polygon points="100,186 150,158 150,102 100,74 50,102 50,158" fill="#C4A96B" stroke="#C4A96B" stroke-width="2"/>
  <polygon points="100,181 145,155 145,105 100,79 55,105 55,155" fill="#1A3D2B" stroke="none"/>

  <!-- Shield left half -->
  <path d="M100,90 L68,102 L68,136 Q68,156 100,165 Z"
        fill="#F5EDD6" stroke="#C4A96B" stroke-width="2"/>

  <!-- Shield right half (slightly offset — cracked) -->
  <path d="M100,90 L133,103 L133,137 Q133,157 100,166 Z"
        fill="#F5EDD6" stroke="#C4A96B" stroke-width="2" transform="translate(2,-1)"/>

  <!-- Crack line (jagged fracture down center) -->
  <polyline points="100,90 97,106 104,118 96,131 102,145 99,165"
            fill="none" stroke="#1A3D2B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Seal ring (broken circle) -->
  <!-- Left arc -->
  <path d="M80,128 A20,20 0 0,1 100,108" fill="none" stroke="#C4A96B" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right arc (offset/broken) -->
  <path d="M100,108 A20,20 0 0,1 118,130" fill="none" stroke="#C4A96B" stroke-width="2.5" stroke-linecap="round" transform="translate(2,1)"/>

  <!-- Star/asterisk in seal center (broken authority) -->
  <line x1="87" y1="128" x2="113" y2="128" stroke="#C4A96B" stroke-width="1.5" opacity="0.7"/>
  <line x1="100" y1="115" x2="100" y2="141" stroke="#C4A96B" stroke-width="1.5" opacity="0.7"/>
  <line x1="91" y1="118" x2="109" y2="138" stroke="#C4A96B" stroke-width="1.5" opacity="0.7"/>
  <line x1="109" y1="118" x2="91" y2="138" stroke="#C4A96B" stroke-width="1.5" opacity="0.7"/>
</svg>
