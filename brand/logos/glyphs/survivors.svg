<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Survivors / Advocacy: rising figure on hex base with torch -->
  <!-- Hex base -->
  <polygon points="100,188 152,158 152,98 100,68 48,98 48,158" fill="#C4A96B" stroke="#C4A96B" stroke-width="2"/>
  <polygon points="100,183 147,155 147,101 100,73 53,101 53,155" fill="#1A3D2B" stroke="none"/>

  <!-- Figure body (simplified isometric person) -->
  <!-- Head -->
  <circle cx="100" cy="100" r="11" fill="#F5EDD6" stroke="#C4A96B" stroke-width="2"/>
  <!-- Torso -->
  <rect x="91" y="111" width="18" height="26" rx="3" fill="#F5EDD6" stroke="#C4A96B" stroke-width="2"/>

  <!-- Left arm raised (salute/torch side) -->
  <line x1="91" y1="118" x2="74" y2="102" stroke="#F5EDD6" stroke-width="5" stroke-linecap="round"/>
  <!-- Right arm natural -->
  <line x1="109" y1="118" x2="122" y2="130" stroke="#F5EDD6" stroke-width="5" stroke-linecap="round"/>

  <!-- Legs -->
  <line x1="96" y1="137" x2="90" y2="158" stroke="#F5EDD6" stroke-width="5" stroke-linecap="round"/>
  <line x1="104" y1="137" x2="110" y2="158" stroke="#F5EDD6" stroke-width="5" stroke-linecap="round"/>

  <!-- Torch (held in left hand) -->
  <rect x="66" y="88" width="6" height="16" rx="1" fill="#C4A96B"/>
  <!-- Flame -->
  <path d="M69,88 Q63,78 69,70 Q72,78 75,70 Q81,78 69,88 Z" fill="#F5EDD6"/>
  <path d="M69,88 Q65,81 69,75 Q72,81 73,75 Q76,81 69,88 Z" fill="#C4A96B" opacity="0.7"/>
</svg>
